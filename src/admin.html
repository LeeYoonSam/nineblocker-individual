<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NineBlockers - 관리자</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 비밀번호 모달 -->
  <div id="auth-modal" class="modal">
    <div class="modal-content">
      <h2>관리자 인증</h2>
      <input type="password" id="password-input" placeholder="비밀번호 입력" autofocus>
      <button id="login-btn">로그인</button>
      <p id="auth-error" class="error hidden">비밀번호가 올바르지 않습니다.</p>
    </div>
  </div>

  <!-- 관리자 폼 -->
  <div id="admin-panel" class="hidden">
    <header>
      <h1>NineBlockers 관리</h1>
      <button id="logout-btn">로그아웃</button>
    </header>

    <main>
      <div class="form-group">
        <label for="sheet-select">연도 선택</label>
        <select id="sheet-select"></select>
      </div>

      <div class="form-group">
        <label for="date-select">기존 날짜 선택</label>
        <select id="date-select">
          <option value="">-- 새 날짜 입력 --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="date-input">날짜 입력 (예: 3/5)</label>
        <input type="text" id="date-input" placeholder="3/5">
      </div>

      <div class="form-group">
        <h3>선수별 점수</h3>
        <div id="player-list"></div>
      </div>

      <button id="save-btn" class="btn-primary">저장</button>
      <p id="save-status" class="hidden"></p>
    </main>

    <footer>
      <a href="index.html">조회 페이지로</a>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/appsscript.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
