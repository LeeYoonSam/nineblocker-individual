<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NineBlockers - 관리자</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 비밀번호 모달 -->
  <div id="auth-modal" class="modal hidden">
    <div class="modal-content">
      <h2>관리자 인증</h2>
      <input type="password" id="password-input" placeholder="비밀번호 입력" autofocus>
      <button id="login-btn">로그인</button>
      <p id="auth-error" class="error hidden">비밀번호가 올바르지 않습니다.</p>
    </div>
  </div>

  <!-- 관리자 폼 -->
  <div id="admin-panel" class="hidden">
    <header>
      <h1>NineBlockers 관리</h1>
      <div class="header-actions">
        <a href="index.html" class="header-nav-link">조회 페이지</a>
        <button id="logout-btn">로그아웃</button>
      </div>
    </header>

    <main>
      <div class="form-group">
        <label for="sheet-select">연도 선택</label>
        <select id="sheet-select"></select>
      </div>

      <div class="form-group">
        <div class="mode-selector">
          <label><input type="radio" name="entry-mode" value="new" checked> 새로운 기록 추가</label>
          <label><input type="radio" name="entry-mode" value="edit"> 기존 기록 수정</label>
        </div>
      </div>

      <div class="form-group" id="new-date-group">
        <label for="date-input">날짜 입력</label>
        <input type="date" id="date-input">
      </div>

      <div class="form-group hidden" id="edit-date-group">
        <label for="date-select">기존 날짜 선택</label>
        <select id="date-select">
          <option value="">-- 날짜 선택 --</option>
        </select>
      </div>

      <div class="form-group">
        <div class="player-section-header">
          <h3>선수별 점수</h3>
          <button id="save-btn" class="btn-primary">저장</button>
        </div>
        <input type="text" id="player-search" placeholder="선수 검색...">
        <div id="player-list"></div>
      </div>
    </main>

  </div>

  <!-- 저장 중 로딩 오버레이 -->
  <div id="save-overlay" class="overlay hidden">
    <div class="overlay-content">
      <div class="spinner"></div>
      <p>저장 중...</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/appsscript.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
