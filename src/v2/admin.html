<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NineBlockers - 관리자</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- 비밀번호 모달 -->
  <div id="auth-modal" class="modal hidden">
    <div class="modal-content">
      <h2>관리자 인증</h2>
      <input type="password" id="password-input" placeholder="비밀번호 입력" autofocus>
      <button id="login-btn" class="btn btn-primary" style="width:100%">로그인</button>
      <p id="auth-error" class="error hidden">비밀번호가 올바르지 않습니다.</p>
    </div>
  </div>

  <!-- 관리자 폼 -->
  <div id="admin-panel" class="hidden">
    <header class="v2-header">
      <div>
        <h1>NineBlockers 관리</h1>
      </div>
      <div class="v2-header-nav">
        <a href="index.html" class="nav-link">허브</a>
        <a href="individual.html" class="nav-link">개인승점</a>
        <button id="logout-btn" class="btn btn-secondary">로그아웃</button>
      </div>
    </header>

    <main class="v2-main">
      <!-- 탭: 개인승점 입력 / 리그 관리 -->
      <div class="segment-control" style="margin-bottom:1.5rem;" id="admin-tabs">
        <button class="segment-btn active" data-tab="scores">개인승점 입력</button>
        <button class="segment-btn" data-tab="leagues">리그 관리</button>
      </div>

      <!-- 개인승점 입력 탭 -->
      <div id="tab-scores">
        <div class="form-group">
          <label for="sheet-select">연도 선택</label>
          <select id="sheet-select"></select>
        </div>

        <div class="form-group">
          <div class="mode-selector">
            <label><input type="radio" name="entry-mode" value="new" checked> 새로운 기록 추가</label>
            <label><input type="radio" name="entry-mode" value="edit"> 기존 기록 수정</label>
          </div>
        </div>

        <div class="form-group" id="new-date-group">
          <label for="date-input">날짜 입력</label>
          <input type="date" id="date-input">
        </div>

        <div class="form-group hidden" id="edit-date-group">
          <label for="date-select">기존 날짜 선택</label>
          <select id="date-select">
            <option value="">-- 날짜 선택 --</option>
          </select>
        </div>

        <div class="form-group">
          <div class="player-section-header">
            <h3>선수별 점수</h3>
            <button id="save-btn" class="btn btn-primary">저장</button>
          </div>
          <input type="text" id="player-search" class="search-input" placeholder="선수 검색..." style="margin-bottom:0.5rem;">
          <div id="player-list"></div>
        </div>
      </div>

      <!-- 리그 관리 탭 -->
      <div id="tab-leagues" class="hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
          <h3>등록된 리그</h3>
          <button id="add-league-btn" class="btn btn-primary" style="font-size:0.85rem;">+ 리그 추가</button>
        </div>
        <div id="league-list">
          <p style="color:var(--text-muted);padding:0.5rem;">로딩 중...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- 저장 중 로딩 오버레이 -->
  <div id="save-overlay" class="overlay hidden">
    <div class="overlay-content">
      <div class="spinner"></div>
      <p>저장 중...</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/appsscript.js"></script>
  <script src="js/registry.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 관리자 탭 전환
    document.getElementById('admin-tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.segment-btn');
      if (!btn) return;
      const tab = btn.dataset.tab;

      document.querySelectorAll('#admin-tabs .segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.getElementById('tab-scores').classList.toggle('hidden', tab !== 'scores');
      document.getElementById('tab-leagues').classList.toggle('hidden', tab !== 'leagues');
    });
  </script>
</body>
</html>
